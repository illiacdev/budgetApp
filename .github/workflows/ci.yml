name: ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install pytest pytest-cov ruff radon xenon
      - run: pytest
      - run: ruff check .
      - run: radon cc -s -a app
      - run: xenon --max-absolute B --max-average A app

